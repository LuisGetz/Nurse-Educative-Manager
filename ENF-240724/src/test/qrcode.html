<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Escáner QR Personalizado</title>
    <script src="../lib/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
</head>

<body>
    <div class="card" style="width: 18rem; margin: auto;">
        <div class="card-header">
            Escáner QR
        </div>
        <div class="card-body">
            <div class="d-flex justify-content-center align-items-center flex-column" id="reader1"
                style="height: 190px;">
                <span class="material-symbols-rounded" style="font-size: 130px;">
                    qr_code_2
                </span>
                <p class="fs-4">Escanear QR</p>
            </div>
            <div class="mt-3 w-100 d-inline-flex">
                <button class="btn btn-primary rounded-pill me-2" onclick="startScanner1()" title="Iniciar Camara"">
              <span class=" material-symbols-rounded align-middle">photo_camera</span>
                </button>
                <button class="btn btn-danger rounded-pill" onclick="stopScanner1()" title="Detener Camara">
                    <span class="material-symbols-rounded align-middle">no_photography</span>
                </button>
            </div>
        </div>
        <div class="card-footer text-body-secondary p-3">
            <div class="input-group input-group-sm">
                <input type="text" class="form-control" placeholder="No. IMSS" aria-label="Recipient's username"
                    aria-describedby="button-addon2" id="txt-con-imss-id">
                <button class="btn btn-outline-success d-flex justify-content-center align-items-center" type="button"
                    id="button-addon2" title="Buscar">
                    <span class="material-symbols-rounded">send</span>
                </button>
            </div>
        </div>
    </div>

    <script src="archibo.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
        crossorigin="anonymous"></script>
</body>

</html>
